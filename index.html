<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Nely's Notebook</title>
  <link rel="icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Rochester&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="home">

  <header class="top-bar">
    <div class="top-bar-inner">
      <a class="site-title" href="index.html">Nely's Notebook</a>
      <nav class="main-nav" aria-label="Main">
        <a href="index.html">Home</a>
        <a href="recipes.html">Recipes</a>
        <a href="about.html">About</a>
      </nav>
    </div>
  </header>

  <main>

   <section class="hero">
  <div class="hero-content">

    <div class="hero-text">
      <h1>Nely's Notebook</h1>
      <p>A growing collection of favorite recipes for every meal.</p>
    </div>

    <div class="email-capture hero-email">
      <form id="emailForm">
        <input
          id="emailInput"
          type="email"
          placeholder="Email for new recipes"
          required
        >
        <button class="btn" type="submit">Join</button>
      </form>
    </div>

  </div>
</section>

    <section class="featured">
      <h2>Featured Recipes</h2>
      <div class="featured-grid" id="featured"></div>
    </section>

  </main>

  <div class="details" id="details">
    <div class="panel">
      <button id="closeBtn">✕</button>
      <h2 id="detailTitle"></h2>
      <div id="detailContent"></div>
    </div>
  </div>

  <footer>© Nely's Recipes</footer>

  <script>
    const browse = document.getElementById("browseBtn");
    if (browse) {
      browse.onclick = () => {
        const target = document.getElementById("featured") || document.getElementById("recipes");
        if (target) target.scrollIntoView({ behavior: "smooth" });
      };
    }

    document.getElementById("emailForm").onsubmit = e => {
      e.preventDefault();
      alert("Subscribed!");
    };
  </script>

  <script src="app.js"></script>

</body>
</html>
